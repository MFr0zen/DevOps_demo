name: Deploy to Amazon ECS

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true 
      ECR_REPOSITORY:        
        required: true
      VERSIONTAGPARAM:
        required: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}       
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}   

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::724268664829:role/demo-githubrole
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::724268664829:role/demo-githubrole
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ inputs.image_tag }}
      run: |
        # Build a docker container and
        # push it to ECR so that it can
        # be deployed to ECS.
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Update image version in SSM
      run: |
          aws ssm put-parameter \
            --name "${{ secrets.VERSIONTAGPARAM }}" \
            --value "${{ inputs.image_tag }}" \
            --type String \
            --overwrite
    
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ${{ secrets.AWS_REGION }} \
          --name devops-demo

    - name: Deploy to EKS
      run: |
        kubectl apply -f k8s/
        kubectl set image deployment/devops-demo \
          app=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

